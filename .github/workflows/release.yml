name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: api-switch.exe
            asset: api-switch-${{ github.ref_name }}-windows-x64.exe
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact: api-switch
            asset: api-switch-${{ github.ref_name }}-macos-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: api-switch
            asset: api-switch-${{ github.ref_name }}-macos-arm64
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: api-switch
            asset: api-switch-${{ github.ref_name }}-linux-x64
          - platform: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: api-switch
            asset: api-switch-${{ github.ref_name }}-linux-arm64
            is-arm64: true

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Linux x64 dependencies
        if: matrix.platform == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Linux ARM64 dependencies
        if: matrix.is-arm64
        run: |
          # Add arm64 architecture
          sudo dpkg --add-architecture arm64
          
          # Completely rewrite sources.list with proper architecture pinning
          # Ubuntu 24.04 (noble): amd64 from archive.ubuntu.com, arm64 from ports.ubuntu.com
          sudo tee /etc/apt/sources.list > /dev/null << 'EOF'
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu noble main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu noble-updates main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu noble-backports main restricted universe multiverse
          deb [arch=amd64] http://security.ubuntu.com/ubuntu noble-security main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse
          EOF
          
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          sudo apt-get install -y libwebkit2gtk-4.1-dev:arm64 libappindicator3-dev:arm64 librsvg2-dev:arm64 patchelf
          
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> $GITHUB_ENV

      - name: Install pnpm and dependencies
        run: |
          npm install -g pnpm
          pnpm install --frozen-lockfile
          pnpm remove sharp png-to-ico

      - name: Build
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Prepare artifact (rename)
        shell: bash
        run: |
          mkdir -p artifact
          binary_dir="src-tauri/target/${{ matrix.target }}/release"
          # Copy binary
          if [ -f "$binary_dir/api-switch.exe" ]; then
            cp "$binary_dir/api-switch.exe" "artifact/${{ matrix.asset }}"
          else
            cp "$binary_dir/api-switch" "artifact/${{ matrix.asset }}"
          fi
          # Copy installer bundles if present
          if [ -d "$binary_dir/bundle" ]; then
            find "$binary_dir/bundle" -type f \( -name '*.msi' -o -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \) -exec cp {} artifact/ \; 2>/dev/null || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: artifact/*

  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
          name: ${{ github.ref_name }}
          body: |
            ## API Switch ${{ github.ref_name }}

            ### Downloads

            **Portable binaries** (no install needed, just run):
            - `api-switch-windows-x64.exe` — Windows
            - `api-switch-macos-x64` — macOS Intel
            - `api-switch-macos-arm64` — macOS Apple Silicon
            - `api-switch-linux-x64` — Linux x64
            - `api-switch-linux-arm64` — Linux ARM64

            **Installers** (system integration):
            - `*.msi` / `*.exe` — Windows installer
            - `*.dmg` — macOS disk image
            - `*.AppImage` — Linux AppImage

            ### Usage
            1. Download and run (or install via installer)
            2. Database is auto-created in the same directory
            3. Point your client to `http://127.0.0.1:9090`
