[package]
name = "api-switch"
version = "0.6.11"
description = "Personal API Management & Forwarding Center"
authors = ["you"]
license = "MIT"
edition = "2021"
rust-version = "1.85.0"

[lib]
name = "api_switch_lib"
crate-type = ["staticlib", "cdylib", "rlib"]
doctest = false

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-opener = "2"
tauri-plugin-process = "2"
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
log = "0.4"
chrono = { version = "0.4", features = ["serde"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time", "sync", "signal"] }
futures = "0.3"
bytes = "1.5"
axum = "0.7"
tower = "0.4"
tower-http = { version = "0.5", features = ["cors"] }
hyper = { version = "1.0", features = ["full"] }
hyper-util = { version = "0.1", features = ["tokio", "http1", "client-legacy"] }
http = "1"
http-body-util = "0.1"
reqwest = { version = "0.12", features = ["rustls-tls-native-roots", "json", "stream", "gzip", "brotli", "deflate"] }
rusqlite = { version = "0.31", features = ["bundled"] }
uuid = { version = "1", features = ["v4"] }
thiserror = "2.0"
anyhow = "1.0"
once_cell = "1.21"
regex = "1.10"
auto-launch = "0.5"
url = "2.5"

[profile.release]
codegen-units = 1
lto = "thin"
opt-level = "s"
